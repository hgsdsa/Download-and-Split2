name: Download and Split Model

on:
  workflow_dispatch:

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download file from Hugging Face
        run: |
          curl -L -o model.bin "https://huggingface.co/Qwen/Qwen3-Embedding-4B-GGUF/resolve/main/Qwen3-Embedding-4B-f16.gguf"

      - name: Split into 300MB parts
        run: |
          mkdir -p parts
          split -b 300m model.bin parts/part_

      - name: Upload each part as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-part-${{ github.run_id }}-${{ github.run_attempt }}
          path: parts/
          if-no-files-found: error
