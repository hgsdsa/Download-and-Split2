name: Download and Split3

on:
  workflow_dispatch:

jobs:
  split:
    runs-on: ubuntu-latest
    outputs:
      parts: ${{ steps.list.outputs.parts }}
    steps:
      - name: Download file from Hugging Face
        run: |
          curl -L -o model.bin "https://huggingface.co/Qwen/Qwen3-Embedding-4B-GGUF/resolve/main/Qwen3-Embedding-4B-f16.gguf"

      - name: Split into 300MB parts
        run: |
          mkdir parts
          split -b 300m model.bin parts/part_

      - name: List parts
        id: list
        run: |
          echo "parts=$(ls parts | jq -R -s -c 'split("\n")[:-1]')" >> $GITHUB_OUTPUT

  upload:
    needs: split
    runs-on: ubuntu-latest
    strategy:
      matrix:
        file: ${{ fromJson(needs.split.outputs.parts) }}
    steps:
      - name: Download split artifacts
        uses: actions/download-artifact@v4
        with:
          name: dummy # no artifact yet, just placeholder

      - name: Upload part
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.file }}
          path: parts/${{ matrix.file }}
